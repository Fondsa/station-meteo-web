<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Station Météo - Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* --- Styles pour le Layout --- */
    #main-content, #menu-btn { display: none; } /* Caché par défaut */
    
    /* Barre du haut */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      background: #ff8800;
      color: white;
      padding: 10px 20px;
      position: fixed;
      top: 0; left: 0;
      z-index: 100;
    }

    /* Icône Menu (3 traits) */
    .menu-icon {
      cursor: pointer;
      font-size: 24px;
      font-weight: bold;
    }

    /* Drawer (Menu latéral) */
    .drawer {
      height: 100%;
      width: 0;
      position: fixed;
      z-index: 200;
      top: 0; right: 0;
      background-color: #ffe082;
      overflow-x: hidden;
      transition: 0.5s;
      padding-top: 60px;
      box-shadow: -2px 0 10px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
    }

    .drawer a, .drawer button {
      padding: 15px 25px;
      text-decoration: none;
      font-size: 18px;
      color: #333;
      display: block;
      transition: 0.3s;
      background: none;
      border: none;
      text-align: left;
      width: 100%;
      cursor: pointer;
    }

    .drawer a:hover, .drawer button:hover { background-color: #ffcc80; }

    .drawer .closebtn {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 30px;
    }

    .logout-box { margin-top: auto; border-top: 1px solid #ff8800; }

    /* Ajustement pour le contenu avec la top-bar */
    body { padding-top: 80px; }
    
    /* Mode sombre manuel pour le body */
    body.nuit { background-color: #2c3e50 !important; color: white; background-image: none; }
    body.nuit .card { background-color: #34495e; color: white; }
  </style>
</head>
<body>

  <div class="top-bar" id="top-bar" style="display:none;">
    <span>Ma Station Météo</span>
    <div class="menu-icon" id="open-drawer">☰</div>
  </div>

  <div id="myDrawer" class="drawer">
    <a href="javascript:void(0)" class="closebtn" id="close-drawer">&times;</a>
    
    <a href="#" id="link-graphs">📈 Graphiques (Bientôt)</a>
    <a href="admin.html" id="admin-link" style="display:none;">🔑 Administration</a>
    <button id="mode-btn">🌙 Mode Nuit</button>

    <div class="logout-box">
      <button id="btn-logout" style="color: red; font-weight: bold;">🚪 Déconnexion</button>
    </div>
  </div>

  <div id="auth-section" class="card">
    <h2>Connexion</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Mot de passe">
    <button id="btn-login">Se connecter</button>
    <button id="btn-signup" style="background-color: #555;">S'inscrire</button>
  </div>

  <div id="main-content">
    <div class="card">
      <h2>Capteurs</h2>
      <p>Extérieur : <span id="temp-ext">--</span> °C | <span id="hum-ext">--</span> %</p>
      <p>Intérieur : <span id="temp-int">--</span> °C | <span id="hum-int">--</span> %</p>
    </div>

    <div class="card">
      <h2>Actionneurs</h2>
      <button id="btn-lampe">Chargement...</button>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, onValue, get, set } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBw417roqkibO6kPgsrx2T77aquDXMHSMA",
    authDomain: "projetfakirradio.firebaseapp.com",
    databaseURL: "https://projetfakirradio-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "projetfakirradio",
    storageBucket: "projetfakirradio.firebasestorage.app",
    messagingSenderId: "363899261538",
    appId: "1:363899261538:web:ad30da02b1485f5c2d373b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  // --- GESTION DU DRAWER ---
  const drawer = document.getElementById("myDrawer");
  document.getElementById("open-drawer").onclick = () => drawer.style.width = "250px";
  document.getElementById("close-drawer").onclick = () => drawer.style.width = "0";

  // --- AUTHENTIFICATION ---
  document.getElementById("btn-login").onclick = () => {
    signInWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("password").value)
      .catch(err => alert(err.message));
  };

  document.getElementById("btn-signup").onclick = async () => {
    const e = document.getElementById("email").value;
    try {
      const res = await createUserWithEmailAndPassword(auth, e, document.getElementById("password").value);
      await set(ref(db, 'users/' + res.user.uid), { email: e, role: "user" });
    } catch (err) { alert(err.message); }
  };

  document.getElementById("btn-logout").onclick = () => {
    signOut(auth);
    drawer.style.width = "0"; // Ferme le menu au logout
  };

  // --- CHANGEMENT DE VUE (LOGGED IN / OUT) ---
  onAuthStateChanged(auth, async (user) => {
    const authSection = document.getElementById("auth-section");
    const mainContent = document.getElementById("main-content");
    const topBar = document.getElementById("top-bar");
    const adminLink = document.getElementById("admin-link");

    if (user) {
      authSection.style.display = "none";
      mainContent.style.display = "block";
      topBar.style.display = "flex";
      
      const snap = await get(ref(db, `users/${user.uid}`));
      if (snap.exists() && snap.val().role === "admin") adminLink.style.display = "block";
    } else {
      authSection.style.display = "block";
      mainContent.style.display = "none";
      topBar.style.display = "none";
    }
  });

  // --- DATA & BOUTONS ---
  onValue(ref(db, "capteurs"), s => {
    const data = s.val();
    document.getElementById("temp-ext").textContent = data.exterieur.temperature;
    document.getElementById("hum-ext").textContent = data.exterieur.humidite;
    document.getElementById("temp-int").textContent = data.interieur.temperature;
    document.getElementById("hum-int").textContent = data.interieur.humidite;
  });

  onValue(ref(db, "commande/lampe"), s => {
    document.getElementById("btn-lampe").textContent = s.val() ? "Éteindre Lampe" : "Allumer Lampe";
  });
  document.getElementById("btn-lampe").onclick = async () => {
    const s = await get(ref(db, "commande/lampe"));
    set(ref(db, "commande/lampe"), !s.val());
  };

  // Mode Jour/Nuit (dans le menu)
  onValue(ref(db, "ui/mode"), s => {
    const m = s.val() || "jour";
    document.body.className = m;
    document.getElementById("mode-btn").textContent = m === "jour" ? "🌙 Mode Nuit" : "☀️ Mode Jour";
  });
  document.getElementById("mode-btn").onclick = async () => {
    const s = await get(ref(db, "ui/mode"));
    set(ref(db, "ui/mode"), s.val() === "jour" ? "nuit" : "jour");
  };

</script>
</body>
</html>
