<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Station Météo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Station Météo</h1>

<div class="card" id="auth-section">
  <h2 id="auth-title">Connexion</h2>
  <input type="email" id="email" placeholder="Email" style="padding:5px; margin:5px;">
  <input type="password" id="password" placeholder="Mot de passe" style="padding:5px; margin:5px;">
  <br>
  <button id="btn-login">Se connecter</button>
  <button id="btn-signup" style="background-color: #555;">S'inscrire</button>
  <p id="user-info"></p>
  <button id="btn-logout" style="display:none; background-color: #888;">Déconnexion</button>
  <br>
  <a href="admin.html" id="admin-link" style="display:none; color: #ff8800; font-weight: bold; text-decoration: none; margin-top: 10px;">Accéder à la Page Admin</a>
</div>

<div class="card">
  <h2>Capteurs</h2>
  <p>Extérieur : <span id="temp-ext">--</span> °C</p>
  <p>Humidité Ext. : <span id="hum-ext">--</span> %</p>
  <p>Intérieur : <span id="temp-int">--</span> °C</p>
  <p>Humidité Int. : <span id="hum-int">--</span> %</p>
</div>

<div class="card">
  <h2>Lampe Extérieure</h2>
  <button id="btn-lampe">Chargement...</button>
</div>

<div class="card">
    <button id="mode-btn">Mode Nuit</button>
</div>

<script type="module" src="App.js"></script>

</body>
</html>
