<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analyses - Station Météo</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { padding-top: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: 0.3s; background-color: #fff3e0; font-family: sans-serif; }
    
    .config-panel { 
      background: white; padding: 20px; border-radius: 12px; 
      width: 90%; max-width: 650px; margin-bottom: 20px; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: flex; flex-direction: column; align-items: center; text-align: center;
    }

    /* Style des boutons de période */
    .time-filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
    .time-filters button { 
      padding: 8px 15px; border: 2px solid #ff8800; background: white; 
      color: #ff8800; cursor: pointer; border-radius: 20px; font-weight: bold; transition: 0.2s;
    }
    .time-filters button.active { background: #ff8800; color: white; }

    #interval-range { width: 100%; max-width: 400px; margin: 15px 0; }
    #btn-validate-interval { 
      width: 100%; max-width: 300px; background-color: #4caf50; color:white; 
      border:none; padding:10px; border-radius:8px; cursor:pointer; font-weight:bold;
    }

    .chart-container { 
      background: white; padding: 20px; border-radius: 15px; 
      width: 95%; max-width: 900px; height: 450px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px;
    }

    body.nuit { background-color: #1a1a1a !important; color: white; }
    body.nuit .config-panel, body.nuit .chart-container { background-color: #333; color: white; border: 1px solid #444; }
    .back-btn { background-color: #ff8800; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; text-decoration: none; }
  </style>
</head>
<body>

  <h1>Analyse Historique</h1>

  <div class="config-panel">
    <div class="time-filters" id="filters">
      <button data-ms="3600000">1H</button>
      <button data-ms="86400000">1J</button>
      <button data-ms="2592000000">1M</button>
      <button data-ms="31536000000">1Y</button>
      <button data-ms="0" class="active">TOUT</button>
    </div>

    <div style="margin-bottom: 10px; font-size: 0.9rem;">
      Fréquence ESP32 : <span id="current-active-val" style="color:#ff8800; font-weight:bold;">--</span>
    </div>
    
    <input type="range" id="interval-range" min="10" max="600" step="10">
    <button id="btn-validate-interval">Changer Fréquence</button>
  </div>

  <div class="chart-container">
    <canvas id="mainChart"></canvas>
  </div>

  <a href="index.html" class="back-btn">Retour</a>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, query, orderByChild, startAt } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  const firebaseConfig = { 
    apiKey: "AIzaSyBw417roqkibO6kPgsrx2T77aquDXMHSMA", 
    authDomain: "projetfakirradio.firebaseapp.com", 
    databaseURL: "https://projetfakirradio-default-rtdb.europe-west1.firebasedatabase.app", 
    projectId: "projetfakirradio", 
    storageBucket: "projetfakirradio.firebasestorage.app", 
    messagingSenderId: "363899261538", 
    appId: "1:363899261538:web:ad30da02b1485f5c2d373b" 
  };
  
  const app = initializeApp(firebaseConfig), db = getDatabase(app), auth = getAuth(app);

  // Initialisation Graphique
  const ctx = document.getElementById('mainChart').getContext('2d');
  const mainChart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [
      { label: 'Temp Ext', data: [], borderColor: '#ff8800', tension: 0.2, yAxisID: 'y' },
      { label: 'Hum Ext', data: [], borderColor: '#3498db', tension: 0.2, yAxisID: 'y1' },
      { label: 'Temp Int', data: [], borderColor: '#e74c3c', tension: 0.2, yAxisID: 'y' },
      { label: 'Hum Int', data: [], borderColor: '#2ecc71', tension: 0.2, yAxisID: 'y1' }
    ]},
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { position: 'left' }, y1: { position: 'right', grid:{drawOnChartArea:false} } } }
  });

  // Fonction de chargement des données filtrées
  let unsubscribe = null;
  function chargerDonnees(periodeMs) {
    if (unsubscribe) unsubscribe(); // Stopper l'ancienne écoute

    let maRequete;
    if (periodeMs === 0) {
      maRequete = query(ref(db, "historique"), orderByChild("timestamp"));
    } else {
      const tempsLimite = Date.now() - periodeMs;
      maRequete = query(ref(db, "historique"), orderByChild("timestamp"), startAt(tempsLimite));
    }

    unsubscribe = onValue(maRequete, (snap) => {
      const d = snap.val(); if (!d) { mainChart.data.labels = []; mainChart.update(); return; }
      const labels = [], tE = [], hE = [], tI = [], hI = [];
      Object.keys(d).sort((a,b) => d[a].timestamp - d[b].timestamp).forEach(key => {
        const p = d[key];
        labels.push(p.temps); tE.push(p.tempExt); hE.push(p.humExt); tI.push(p.tempInt); hI.push(p.humInt);
      });
      mainChart.data.labels = labels;
      mainChart.data.datasets[0].data = tE; mainChart.data.datasets[1].data = hE;
      mainChart.data.datasets[2].data = tI; mainChart.data.datasets[3].data = hI;
      mainChart.update();
    });
  }

  // Gestion des clics sur les filtres
  document.getElementById('filters').addEventListener('click', (e) => {
    if (e.target.tagName === 'BUTTON') {
      document.querySelectorAll('#filters button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      chargerDonnees(parseInt(e.target.dataset.ms));
    }
  });

  // Démarrage
  onAuthStateChanged(auth, (u) => {
    if (!u) window.location.href = "index.html";
    onValue(ref(db, `users/${u.uid}`), (s) => { if(s.exists()) document.body.className = s.val().theme; });
    chargerDonnees(0); // Charger "Tout" par défaut
  });

  // Fréquence
  const range = document.getElementById('interval-range'), activeDisp = document.getElementById('current-active-val');
  onValue(ref(db, "config/intervalle_sec"), (s) => { activeDisp.textContent = s.val() + "s"; range.value = s.val(); });
  document.getElementById('btn-validate-interval').onclick = () => set(ref(db, "config/intervalle_sec"), parseInt(range.value));
</script>
</body>
</html>
