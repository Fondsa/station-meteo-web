<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graphiques Dynamiques - Station Météo</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { padding-top: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .config-panel { background: white; padding: 15px; border-radius: 12px; width: 90%; max-width: 800px; margin-bottom: 15px; display: flex; flex-wrap: wrap; justify-content: space-around; gap: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .chart-container { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 850px; height: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .controls { display: flex; flex-direction: column; gap: 5px; font-weight: bold; }
    .checkbox-group { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 10px; }
    
    body.nuit { background-color: #1a1a1a !important; color: white; }
    body.nuit .config-panel, body.nuit .chart-container { background-color: #333; color: white; }
  </style>
</head>
<body>

  <h1>Analyse des Données</h1>

  <div class="config-panel">
    <div class="controls">
      <label for="interval-range">Fréquence de relevé : <span id="interval-val">5</span> min</label>
      <input type="range" id="interval-range" min="1" max="60" step="1" value="5">
    </div>
    
    <div class="checkbox-group">
      <label><input type="checkbox" id="check-temp-ext" checked> Temp. Ext</label>
      <label><input type="checkbox" id="check-hum-ext" checked> Hum. Ext</label>
      <label><input type="checkbox" id="check-temp-int" checked> Temp. Int</label>
      <label><input type="checkbox" id="check-hum-int" checked> Hum. Int</label>
    </div>
  </div>

  <div class="chart-container">
    <canvas id="mainChart"></canvas>
  </div>

  <div class="card">
    <button onclick="window.location.href='index.html'">Retour au Dashboard</button>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, onValue, get, set, push, limitToLast, query } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBw417roqkibO6kPgsrx2T77aquDXMHSMA",
    authDomain: "projetfakirradio.firebaseapp.com",
    databaseURL: "https://projetfakirradio-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "projetfakirradio",
    storageBucket: "projetfakirradio.firebasestorage.app",
    messagingSenderId: "363899261538",
    appId: "1:363899261538:web:ad30da02b1485f5c2d373b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  // --- INITIALISATION DU GRAPHIQUE ---
  const ctx = document.getElementById('mainChart').getContext('2d');
  const mainChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [], // Les heures arriveront ici
      datasets: [
        { label: 'Temp Ext (°C)', data: [], borderColor: '#ff8800', backgroundColor: '#ff8800', yAxisID: 'y' },
        { label: 'Hum Ext (%)', data: [], borderColor: '#3498db', backgroundColor: '#3498db', yAxisID: 'y1', hidden: false },
        { label: 'Temp Int (°C)', data: [], borderColor: '#e74c3c', backgroundColor: '#e74c3c', yAxisID: 'y' },
        { label: 'Hum Int (%)', data: [], borderColor: '#2ecc71', backgroundColor: '#2ecc71', yAxisID: 'y1' }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Température (°C)' } },
        y1: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'Humidité (%)' } }
      }
    }
  });

  // --- GESTION DU THÈME ET AUTH ---
  onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.href = "index.html"; return; }
    onValue(ref(db, `users/${user.uid}`), (snap) => {
      if (snap.exists()) document.body.className = snap.val().theme || "jour";
    });
  });

  // --- LOGIQUE DE L'INTERVALLE ---
  const rangeInput = document.getElementById('interval-range');
  const rangeVal = document.getElementById('interval-val');
  
  // Charger l'intervalle depuis la DB
  onValue(ref(db, "config/intervalle"), (s) => {
    const val = s.val() || 5;
    rangeInput.value = val;
    rangeVal.textContent = val;
  });

  rangeInput.oninput = () => {
    const val = rangeInput.value;
    rangeVal.textContent = val;
    set(ref(db, "config/intervalle"), parseInt(val));
  };

  // --- GESTION DES CASES À COCHER (Affichage/Masquage) ---
  const setupToggle = (id, datasetIndex) => {
    document.getElementById(id).onchange = (e) => {
      mainChart.setDatasetVisibility(datasetIndex, e.target.checked);
      mainChart.update();
    };
  };
  setupToggle('check-temp-ext', 0);
  setupToggle('check-hum-ext', 1);
  setupToggle('check-temp-int', 2);
  setupToggle('check-hum-int', 3);

  // --- RÉCUPÉRATION DES DONNÉES HISTORIQUES ---
  // On récupère les 50 derniers points de l'historique
  const historiqueRef = query(ref(db, "historique"), limitToLast(50));
  onValue(historiqueRef, (snapshot) => {
    const data = snapshot.val();
    if (!data) return;

    const labels = [];
    const tExt = [], hExt = [], tInt = [], hInt = [];

    Object.values(data).forEach(point => {
      labels.push(point.temps);
      tExt.push(point.tempExt);
      hExt.push(point.humExt);
      tInt.push(point.tempInt);
      hInt.push(point.humInt);
    });

    mainChart.data.labels = labels;
    mainChart.data.datasets[0].data = tExt;
    mainChart.data.datasets[1].data = hExt;
    mainChart.data.datasets[2].data = tInt;
    mainChart.data.datasets[3].data = hInt;
    mainChart.update();
  });

</script>
</body>
</html>
