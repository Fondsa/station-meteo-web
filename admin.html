<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Console Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Console Administration</h1>
  <div class="card">
    <h2>Gestion des Utilisateurs</h2>
    <div id="user-list">Chargement...</div>
  </div>
  <div class="card">
    <button id="btn-back">Retour à l'accueil</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, onValue, remove, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBw417roqkibO6kPgsrx2T77aquDXMHSMA",
      authDomain: "projetfakirradio.firebaseapp.com",
      databaseURL: "https://projetfakirradio-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "projetfakirradio",
      storageBucket: "projetfakirradio.firebasestorage.app",
      messagingSenderId: "363899261538",
      appId: "1:363899261538:web:ad30da02b1485f5c2d373b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // Bouton retour
    document.getElementById("btn-back").onclick = () => window.location.href = "index.html";

    // Sécurité : Vérification Admin
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "index.html"; return; }
      const snap = await get(ref(db, `users/${user.uid}`));
      if (!snap.exists() || snap.val().role !== "admin") {
        alert("Accès interdit");
        window.location.href = "index.html";
      }
    });

    // Liste des utilisateurs
    onValue(ref(db, "users"), (snapshot) => {
      const users = snapshot.val();
      const list = document.getElementById("user-list");
      list.innerHTML = "";
      for (let uid in users) {
        const u = users[uid];
        const div = document.createElement("div");
        div.style.padding = "10px";
        div.style.borderBottom = "1px solid orange";
        div.innerHTML = `
          <p>${u.email} (<strong>${u.role}</strong>)</p>
          ${u.role !== 'admin' ? `<button class="del-btn" data-id="${uid}" style="background:red">Supprimer</button>` : ''}
        `;
        list.appendChild(div);
      }

      // Attacher les clics sur les boutons supprimer
      document.querySelectorAll(".del-btn").forEach(btn => {
        btn.onclick = () => {
          const id = btn.getAttribute("data-id");
          if(confirm("Supprimer ?")) remove(ref(db, `users/${id}`));
        };
      });
    });
  </script>
</body>
</html>
