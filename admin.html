<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Administration - Sécurisée</title>
  <link rel="stylesheet" href="style.css">
  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; width: 100%; }
    body { 
      padding-top: 20px; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      background-color: #fff3e0; 
      transition: background-color 0.3s, color 0.3s;
    }
    h1 { color: #ff8800; }
    .user-card { 
      background: white; 
      padding: 15px; 
      margin: 10px; 
      border-radius: 8px; 
      width: 90%; 
      max-width: 450px; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
      border-left: 5px solid #ff8800; 
      transition: background-color 0.3s, color 0.3s;
    }
    .user-actions { display: flex; gap: 10px; margin-top: 15px; }
    .btn-del { background: #ff4444; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .btn-promo { background: #4caf50; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .badge-admin { color: #4caf50; font-weight: bold; text-transform: uppercase; border: 1px solid #4caf50; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
    
    /* Mode Nuit */
    body.nuit { background-color: #1a1a1a !important; color: white; }
    body.nuit h1 { color: #ffcc80; }
    body.nuit .user-card { background-color: #333; color: #eee; border-left: 5px solid #ffcc80; }
    body.nuit .card { background-color: #2c3e50; color: white; }
  </style>
</head>
<body>

  <h1>Gestion Utilisateurs</h1>

  <div id="user-list">Chargement...</div>

  <div class="card">
    <button onclick="window.location.href='index.html'">Retour au Dashboard</button>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, onValue, remove, get, update } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBw417roqkibO6kPgsrx2T77aquDXMHSMA",
    authDomain: "projetfakirradio.firebaseapp.com",
    databaseURL: "https://projetfakirradio-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "projetfakirradio",
    storageBucket: "projetfakirradio.firebasestorage.app",
    messagingSenderId: "363899261538",
    appId: "1:363899261538:web:ad30da02b1485f5c2d373b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  let currentAdminUid = "";

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "index.html"; return; }
    currentAdminUid = user.uid;

    onValue(ref(db, `users/${user.uid}`), (snap) => {
      if (snap.exists()) {
        const userData = snap.val();
        if (userData.role !== "admin") { window.location.href = "index.html"; }
        document.body.className = userData.theme || "jour";
      }
    });
  });

  onValue(ref(db, "users"), (snapshot) => {
    const users = snapshot.val();
    const container = document.getElementById("user-list");
    container.innerHTML = "";
    if (!users) return;

    for (let uid in users) {
      const u = users[uid];
      const div = document.createElement("div");
      div.className = "user-card";
      
      const isSelf = (uid === currentAdminUid);
      const isAdmin = (u.role === "admin");

      div.innerHTML = `
        <p><strong>Email:</strong> ${u.email}</p>
        <p><strong>Statut:</strong> ${isAdmin ? '<span class="badge-admin">Administrateur</span>' : '<span>Utilisateur Standard</span>'}</p>
        <div class="user-actions">
          ${isSelf ? '<em>(Votre compte)</em>' : 
            isAdmin ? '<em>Sécurisé (Aucune action possible)</em>' : 
            `<button class="btn-promo" data-id="${uid}">Rendre Admin</button>
             <button class="btn-del" data-id="${uid}">Supprimer le compte</button>`
          }
        </div>
      `;
      container.appendChild(div);
    }

    // Actions
    document.querySelectorAll(".btn-promo").forEach(btn => {
      btn.onclick = () => {
        const id = btn.getAttribute("data-id");
        if(confirm("Promouvoir ce compte en Administrateur ? Attention : cette action est irréversible via cette interface.")) {
          update(ref(db, `users/${id}`), { role: "admin" });
        }
      };
    });

    document.querySelectorAll(".btn-del").forEach(btn => {
      btn.onclick = () => {
        const id = btn.getAttribute("data-id");
        if(confirm("Supprimer ce compte définitivement ?")) {
          remove(ref(db, `users/${id}`));
        }
      };
    });
  });
</script>
</body>
</html>
