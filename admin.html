<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Administration - Station Météo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* --- Styles de base et Fix du fond --- */
    html, body { margin: 0; padding: 0; min-height: 100vh; width: 100%; }
    body { 
      padding-top: 20px; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      background-color: #fff3e0; 
      transition: background-color 0.3s, color 0.3s;
    }

    h1 { color: #ff8800; }

    /* --- Cartes Utilisateurs --- */
    .user-card { 
      background: white; 
      padding: 15px; 
      margin: 10px; 
      border-radius: 8px; 
      width: 90%; 
      max-width: 450px; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
      border-left: 5px solid #ff8800; 
      transition: background-color 0.3s, color 0.3s;
    }

    .user-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .btn-del { 
      background: #ff4444; 
      color: white; 
      border: none; 
      padding: 8px 12px; 
      border-radius: 5px; 
      cursor: pointer; 
      font-weight: bold;
      font-size: 14px;
    }

    .btn-promo { 
      background: #4caf50; 
      color: white; 
      border: none; 
      padding: 8px 12px; 
      border-radius: 5px; 
      cursor: pointer; 
      font-weight: bold;
      font-size: 14px;
    }

    .btn-demote { 
      background: #2196f3; 
      color: white; 
      border: none; 
      padding: 8px 12px; 
      border-radius: 5px; 
      cursor: pointer; 
      font-weight: bold;
      font-size: 14px;
    }

    /* --- MODE NUIT ADMIN --- */
    body.nuit { background-color: #1a1a1a !important; color: white; }
    body.nuit h1 { color: #ffcc80; }
    body.nuit .user-card { background-color: #333; color: #eee; border-left: 5px solid #ffcc80; }
    body.nuit .card { background-color: #2c3e50; color: white; }
  </style>
</head>
<body>

  <h1>Gestion Utilisateurs</h1>

  <div id="user-list">Chargement des comptes...</div>

  <div class="card">
    <button onclick="window.location.href='index.html'">Retour au Dashboard</button>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, onValue, remove, get, update } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBw417roqkibO6kPgsrx2T77aquDXMHSMA",
    authDomain: "projetfakirradio.firebaseapp.com",
    databaseURL: "https://projetfakirradio-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "projetfakirradio",
    storageBucket: "projetfakirradio.firebasestorage.app",
    messagingSenderId: "363899261538",
    appId: "1:363899261538:web:ad30da02b1485f5c2d373b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  let currentAdminUid = "";

  // --- SURVEILLANCE AUTH & THÈME ---
  onAuthStateChanged(auth, async (user) => {
    if (!user) { 
      window.location.href = "index.html"; 
      return; 
    }
    currentAdminUid = user.uid;

    onValue(ref(db, `users/${user.uid}`), (snap) => {
      if (snap.exists()) {
        const userData = snap.val();
        if (userData.role !== "admin") {
          window.location.href = "index.html";
        }
        document.body.className = userData.theme || "jour";
      } else {
        window.location.href = "index.html";
      }
    });
  });

  // --- AFFICHAGE DE LA LISTE DES UTILISATEURS ---
  onValue(ref(db, "users"), (snapshot) => {
    const users = snapshot.val();
    const container = document.getElementById("user-list");
    container.innerHTML = "";

    if (!users) return;

    for (let uid in users) {
      const u = users[uid];
      const div = document.createElement("div");
      div.className = "user-card";
      
      // On empêche l'admin de se modifier lui-même pour éviter les erreurs
      const isSelf = (uid === currentAdminUid);

      div.innerHTML = `
        <p><strong>Email:</strong> ${u.email}</p>
        <p><strong>Rôle:</strong> <span style="text-transform: uppercase; font-weight: bold; color: ${u.role === 'admin' ? '#4caf50' : '#2196f3'}">${u.role}</span></p>
        <div class="user-actions">
          ${!isSelf && u.role === 'user' ? `<button class="btn-promo" data-id="${uid}">Promouvoir Admin</button>` : ''}
          ${!isSelf && u.role === 'admin' ? `<button class="btn-demote" data-id="${uid}">Rétrograder User</button>` : ''}
          ${!isSelf ? `<button class="btn-del" data-id="${uid}">Supprimer</button>` : '<em>(Vous êtes connecté)</em>'}
        </div>
      `;
      container.appendChild(div);
    }

    // --- ACTIONS ---

    // Promouvoir Admin
    document.querySelectorAll(".btn-promo").forEach(btn => {
      btn.onclick = () => {
        const id = btn.getAttribute("data-id");
        if(confirm("Promouvoir cet utilisateur en Administrateur ?")) {
          update(ref(db, `users/${id}`), { role: "admin" });
        }
      };
    });

    // Rétrograder User
    document.querySelectorAll(".btn-demote").forEach(btn => {
      btn.onclick = () => {
        const id = btn.getAttribute("data-id");
        if(confirm("Rétrograder cet administrateur en simple utilisateur ?")) {
          update(ref(db, `users/${id}`), { role: "user" });
        }
      };
    });

    // Supprimer
    document.querySelectorAll(".btn-del").forEach(btn => {
      btn.onclick = () => {
        const id = btn.getAttribute("data-id");
        if(confirm("Supprimer définitivement ce compte de la base ?")) {
          remove(ref(db, `users/${id}`));
        }
      };
    });
  });
</script>
</body>
</html>
