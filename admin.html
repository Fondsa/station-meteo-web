<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Administration</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding-top: 20px; display: flex; flex-direction: column; align-items: center; background-color: #fff3e0; }
    .user-card { background: white; padding: 15px; margin: 10px; border-radius: 8px; width: 320px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #ff8800; }
    .btn-del { background: #ff4444; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>

  <h1>Gestion Utilisateurs</h1>

  <div id="user-list">Chargement des comptes...</div>

  <div class="card">
    <button onclick="window.location.href='index.html'">Retour au Dashboard</button>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, onValue, remove, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBw417roqkibO6kPgsrx2T77aquDXMHSMA",
    authDomain: "projetfakirradio.firebaseapp.com",
    databaseURL: "https://projetfakirradio-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "projetfakirradio",
    storageBucket: "projetfakirradio.firebasestorage.app",
    messagingSenderId: "363899261538",
    appId: "1:363899261538:web:ad30da02b1485f5c2d373b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "index.html"; return; }
    const snap = await get(ref(db, `users/${user.uid}`));
    if (!snap.exists() || snap.val().role !== "admin") { window.location.href = "index.html"; }
  });

  onValue(ref(db, "users"), (snapshot) => {
    const users = snapshot.val();
    const container = document.getElementById("user-list");
    container.innerHTML = "";

    for (let uid in users) {
      const u = users[uid];
      const div = document.createElement("div");
      div.className = "user-card";
      div.innerHTML = `
        <p><strong>Email:</strong> ${u.email}</p>
        <p><strong>Rôle:</strong> ${u.role}</p>
        ${u.role !== 'admin' ? `<button class="btn-del" data-id="${uid}">Supprimer le compte</button>` : '<em>Compte Admin</em>'}
      `;
      container.appendChild(div);
    }

    document.querySelectorAll(".btn-del").forEach(btn => {
      btn.onclick = () => {
        const id = btn.getAttribute("data-id");
        if(confirm("Confirmer la suppression ?")) remove(ref(db, `users/${id}`));
      };
    });
  });
</script>
</body>
</html>
