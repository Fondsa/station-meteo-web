<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Administration - Station Météo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* --- Styles de base et Fix du fond --- */
    html, body { margin: 0; padding: 0; min-height: 100vh; width: 100%; }
    body { 
      padding-top: 20px; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      background-color: #fff3e0; 
      transition: background-color 0.3s, color 0.3s;
    }

    h1 { color: #ff8800; }

    /* --- Cartes Utilisateurs --- */
    .user-card { 
      background: white; 
      padding: 15px; 
      margin: 10px; 
      border-radius: 8px; 
      width: 90%; 
      max-width: 400px; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
      border-left: 5px solid #ff8800; 
      transition: background-color 0.3s, color 0.3s;
    }

    .btn-del { 
      background: #ff4444; 
      color: white; 
      border: none; 
      padding: 10px; 
      border-radius: 5px; 
      cursor: pointer; 
      font-weight: bold;
    }

    /* --- MODE NUIT ADMIN --- */
    body.nuit { background-color: #1a1a1a !important; color: white; }
    body.nuit h1 { color: #ffcc80; }
    body.nuit .user-card { background-color: #333; color: #eee; border-left: 5px solid #ffcc80; }
    body.nuit .card { background-color: #2c3e50; color: white; }
  </style>
</head>
<body>

  <h1>Gestion Utilisateurs</h1>

  <div id="user-list">Chargement des comptes...</div>

  <div class="card">
    <button onclick="window.location.href='index.html'">Retour au Dashboard</button>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, onValue, remove, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBw417roqkibO6kPgsrx2T77aquDXMHSMA",
    authDomain: "projetfakirradio.firebaseapp.com",
    databaseURL: "https://projetfakirradio-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "projetfakirradio",
    storageBucket: "projetfakirradio.firebasestorage.app",
    messagingSenderId: "363899261538",
    appId: "1:363899261538:web:ad30da02b1485f5c2d373b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  // --- SURVEILLANCE AUTH & THÈME ---
  onAuthStateChanged(auth, async (user) => {
    if (!user) { 
      window.location.href = "index.html"; 
      return; 
    }

    // On écoute en temps réel les infos de l'utilisateur connecté (Rôle + Thème)
    onValue(ref(db, `users/${user.uid}`), (snap) => {
      if (snap.exists()) {
        const userData = snap.val();

        // 1. Sécurité : Si l'utilisateur n'est plus admin, on l'expulse
        if (userData.role !== "admin") {
          window.location.href = "index.html";
        }

        // 2. Synchronisation du Thème
        const currentTheme = userData.theme || "jour";
        document.body.className = currentTheme;
      } else {
        window.location.href = "index.html";
      }
    });
  });

  // --- AFFICHAGE DE LA LISTE DES UTILISATEURS ---
  onValue(ref(db, "users"), (snapshot) => {
    const users = snapshot.val();
    const container = document.getElementById("user-list");
    container.innerHTML = "";

    if (!users) return;

    for (let uid in users) {
      const u = users[uid];
      const div = document.createElement("div");
      div.className = "user-card";
      div.innerHTML = `
        <p><strong>Email:</strong> ${u.email}</p>
        <p><strong>Rôle:</strong> ${u.role}</p>
        ${u.role !== 'admin' ? `<button class="btn-del" data-id="${uid}">Supprimer le compte</button>` : '<em>Compte Administrateur</em>'}
      `;
      container.appendChild(div);
    }

    // Gestion de la suppression
    document.querySelectorAll(".btn-del").forEach(btn => {
      btn.onclick = () => {
        const id = btn.getAttribute("data-id");
        if(confirm("Voulez-vous vraiment supprimer cet utilisateur ?")) {
          remove(ref(db, `users/${id}`));
        }
      };
    });
  });
</script>
</body>
</html>
